# ========================
# MOD KEY
# ========================
$mod = ALT


$kb_path = /sys/class/backlight/appletb_backlight
$kb_max = /sys/class/backlight/appletb_backlight/max_brightness

# ========================
# MONITORS (laptop + external)
# ========================
# Adjust names via: hyprctl monitors//
monitor = eDP-1, preferred, auto, 1.5
monitor = DP-1, preferred, auto, 2.0
monitor = DP-6, preferred, auto-left, 1.0
monitor = DP-3, preferred, auto-left, 1.0

# Workspaces mapped
workspace = 1, monitor:DP-1
workspace = 2, monitor:DP-1
workspace = 3, monitor:DP-1
workspace = 4, monitor:DP-1
workspace = 5, monitor:DP-1

workspace = 6, monitor:eDP-1
workspace = 7, monitor:eDP-1
workspace = 8, monitor:eDP-1
workspace = 9, monitor:eDP-1
workspace = 10, monitor:eDP-1

# ========================
# AUTOSTART
# ========================
exec-once = waybar
exec-once = nm-applet --indicator
exec-once = dex --autostart --environment Hyprland

# Wallpaper
exec-once = hyprpaper

# Idle manager
exec-once = hypridle

# ========================
# INPUT
# ========================
input {
    kb_layout = us
    kb_options = ctrl:nocaps

    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
    natural_scroll = true
}

# ========================
# GENERAL LOOK
# ========================
general {
    gaps_in = 6
    gaps_out = 12
    border_size = 2
    col.active_border = rgba(88c0d0ff)
    col.inactive_border = rgba(4c566a88)
}

# ========================
# DECORATION (BLUR + TRANSPARENCY)
# ========================
decoration {
    rounding = 10

    blur {
        enabled = true
        size = 8
        passes = 2
        new_optimizations = true
    }

    # drop_shadow = true
    # shadow_range = 20
    # shadow_render_power = 3
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    focus_on_activate = true
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}

# ========================
# ANIMATIONS
# ========================
animations {
    enabled = false 

    bezier = easeOut, 0.25, 1, 0.5, 1
    bezier = easeIn, 0.5, 0, 1, 0.75

    animation = windows, 1, 6, easeOut
    animation = windowsOut, 1, 5, easeIn
    animation = fade, 1, 5, default
    animation = border, 1, 5, default
    animation = workspaces, 1, 6, easeOut
}

# ========================
# LAYOUT
# ========================
# dwindle {
#    pseudotile = true
#    preserve_split = true
# }

# ========================
# KEYBINDS
# ========================

bind = $mod, RETURN, exec, kitty
bind = $mod, D, exec, rofi -show drun

bind = $mod SHIFT, Q, killactive
bind = $mod, F, fullscreen
bind = $mod SHIFT, SPACE, togglefloating
bind = $mod, P, exec, hyprshot -m region 

# Focus
bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r

# Move windows
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, J, movewindow, d
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, L, movewindow, r

# Resize mode
bind = $mod, R, submap, resize

submap = resize
bind = , H, resizeactive, -30 0
bind = , L, resizeactive, 30 0
bind = , K, resizeactive, 0 -30
bind = , J, resizeactive, 0 30
bind = , escape, submap, reset
submap = reset

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Audio
bind = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +10%
bind = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -10%
bind = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bind = , XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
# Brightness
bind = , XF86MonBrightnessUp, exec, brightnessctl set +10%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 10%-


# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


# Up/Down (10% steps)
bind = , XF86KbdBrightnessUp, exec, echo $(( $(cat $kb_max) / 10 )) > $kb_path
bind = , XF86KbdBrightnessDown, exec, echo $(( $(cat $kb_max) / 20 )) > $kb_path
bind = , XF86KbdBrightnessToggle, exec, echo 0 > $kb_path
# Lock screen
bind = SUPER, L, exec, hyprlock

# Reload / exit
bind = $mod SHIFT, C, exec, hyprctl reload
bind = $mod SHIFT, E, exit
