background {
    path = ~/Downloads/wallpaper.jpg
    blur_passes = 2
    blur_size = 8
}

label {
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    font_size = 80
    position = 0, 100
    halign = center
    valign = center
}

input-field {
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.3
    fade_on_empty = false
    position = 0, -100
    halign = center
    valign = center
}
